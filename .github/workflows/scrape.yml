name: Daily Jail Scrape

on:
  schedule:
    - cron: '0 8 * * *' # Runs every day at 8:00 AM UTC
  workflow_dispatch:     # Allows you to click a button to run it manually

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Required to save the CSV back to your repo
      
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright pandas beautifulsoup4 lxml
          playwright install chromium

      - name: Run Scraper
        run: python main.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dane_jail_full_scrape.csv
          # Only commit if there is a change
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update jail data" && git push)
