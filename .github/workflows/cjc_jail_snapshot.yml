name: CJC Jail Snapshot Scraper

on:
  schedule:
    # Runs daily at 06:00 UTC (~1 AM Central) - adjust to match your other pipelines
    - cron: "0 6 * * *"
  workflow_dispatch: {}  # allows manual triggering from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python cjc_jail_snapshot_scraper.py

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_*.png
          if-no-files-found: ignore

      - name: Commit and push new data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "Add jail snapshot data for $(date -u +%Y-%m-%d)"
          git push
