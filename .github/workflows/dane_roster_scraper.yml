name: Daily Jail Scrape
on:
  schedule:
    - cron: '0 8 * * *' # Runs at 6am Central (CDT/UTC-5). Note: during CST (winter), this becomes 5am Central — adjust to '0 12 * * *' if you want it to stay fixed at 6am.
  workflow_dispatch:    # Allows you to click "Run workflow" manually
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install pandas beautifulsoup4 lxml requests
      - name: Run scraper
        run: python scrape_dane_roster.py
      - name: Commit and push CSV
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add *.csv
          # This command checks if there are changes; if yes, it commits and pushes.
          # If no changes, it skips safely.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update jail data" && git push)
