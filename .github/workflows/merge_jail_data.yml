name: Merge Jail Data

on:
  schedule:
    # Runs a few hours after the Dane and CJC scrapers, to give them time to finish and push
    - cron: "0 10 * * *"
  workflow_dispatch: {}

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas

      - name: Run merge script
        run: python merge_jail_data.py

      - name: Commit and push merged data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add merged/
          git diff --quiet --cached || git commit -m "Merge jail data for $(date -u +%Y-%m-%d)"
          git push
