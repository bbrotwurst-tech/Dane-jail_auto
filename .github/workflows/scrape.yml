name: Daily Jail Scrape

on:
  schedule:
    - cron: '0 0 * * *' # Runs at midnight
  workflow_dispatch:    # Allows you to click "Run workflow" manually

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pandas beautifulsoup4 lxml playwright
          playwright install chromium

      - name: Run scraper
        run: python main.py

      - name: Commit and push CSV
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add *.csv
          # This command checks if there are changes; if yes, it commits and pushes. 
          # If no changes, it skips safely.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update jail data" && git push)
