name: Weekly Columbia Bookings Scrape

on:
  schedule:
    - cron: '0 11 * * 1' # Runs Monday 6am Central (CDT/UTC-5). During CST (winter), shift to '0 12 * * 1' to stay at 6am.
  workflow_dispatch:    # Allows you to click "Run workflow" manually

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pandas pdfplumber

      - name: Download latest Columbia bookings PDF
        run: curl -f -o webdailybookings.pdf "https://www.co.columbia.wi.us/columbiacounty/Portals/11/Bookings/webdailybookings.pdf"

      - name: Run Columbia bookings parser
        run: python columbia_main.py

      - name: Commit and push updated log
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add columbia_bookings_log.csv
          NEW_COUNT=$(python3 -c "print(len(open('columbia_bookings_log.csv').readlines()) - 1)")
          # This command checks if there are changes; if yes, it commits and pushes.
          # If no changes, it skips safely.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Columbia County bookings log ($NEW_COUNT total records)" && git push)
